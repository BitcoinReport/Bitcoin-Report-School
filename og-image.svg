<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07080a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0f16;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#f7931a;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Glow halo behind ₿ -->
  <ellipse cx="600" cy="280" rx="320" ry="220" fill="#f7931a" opacity="0.07" filter="url(#blur)" />

  <!-- Grid lines (subtle) -->
  <g stroke="#1c2030" stroke-width="1" opacity="0.6">
    <line x1="0" y1="105" x2="1200" y2="105" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="525" x2="1200" y2="525" />
    <line x1="150" y1="0" x2="150" y2="630" />
    <line x1="300" y1="0" x2="300" y2="630" />
    <line x1="450" y1="0" x2="450" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="750" y1="0" x2="750" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
    <line x1="1050" y1="0" x2="1050" y2="630" />
  </g>

  <!-- Border frame -->
  <rect x="32" y="32" width="1136" height="566" rx="12" fill="none" stroke="#1c2030" stroke-width="1.5" />
  <rect x="40" y="40" width="1120" height="550" rx="10" fill="none" stroke="#f7931a" stroke-width="0.5" opacity="0.25" />

  <!-- ₿ symbol large -->
  <text
    x="600"
    y="320"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="220"
    font-weight="700"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="#f7931a"
    opacity="0.12"
  >₿</text>

  <!-- Main title -->
  <text
    x="600"
    y="248"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    text-anchor="middle"
    fill="#f7931a"
    letter-spacing="2"
  >Bitcoin Report School</text>

  <!-- Subtitle -->
  <text
    x="600"
    y="318"
    font-family="'Courier New', Courier, monospace"
    font-size="28"
    text-anchor="middle"
    fill="#ffffff"
    opacity="0.75"
    letter-spacing="4"
  >IMPARA BITCOIN DAL CODICE</text>

  <!-- Divider line -->
  <line x1="420" y1="348" x2="780" y2="348" stroke="#f7931a" stroke-width="1" opacity="0.4" />

  <!-- Tag line -->
  <text
    x="600"
    y="388"
    font-family="'Courier New', Courier, monospace"
    font-size="17"
    text-anchor="middle"
    fill="#7a7870"
    letter-spacing="2"
  >Strumenti interattivi · Crittografia · Mining · Lightning Network</text>

  <!-- URL label bottom -->
  <text
    x="600"
    y="560"
    font-family="'Courier New', Courier, monospace"
    font-size="15"
    text-anchor="middle"
    fill="#f7931a"
    opacity="0.5"
    letter-spacing="1"
  >bitcoinreportschool.com</text>
</svg>
